<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GETTOPIK online — 43~44-savollar so'zlari</title>
<style>
  :root{
    --bg:#EEF1F6;
    --card:#FFFFFF;
    --ink:#0E1320;
    --muted:#5B6478;
    --line:#D8DEE9;
    --accent:#2743E0;
    --ok:#127A4B;
    --no:#C0142E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    font-size:17px;
    line-height:1.7;
    display:flex;
    justify-content:center;
    padding:24px 16px 56px;
  }
  .wrap{width:100%;max-width:720px}

  header{margin-bottom:22px}
  .brand{
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);font-weight:600;
  }
  h1{font-size:30px;line-height:1.25;margin-top:6px;letter-spacing:-.02em}
  .lead{color:var(--muted);margin-top:8px}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:26px;margin-bottom:16px;
  }
  h2{font-size:20px;margin-bottom:14px;letter-spacing:-.01em}
  .hint{color:var(--muted);font-size:15px}

  .sets{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .set{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:18px;cursor:pointer;text-align:left;font:inherit;color:inherit;
    transition:border-color .15s, transform .15s;
  }
  @media (hover:hover){ .set:hover{border-color:var(--accent);transform:translateY(-2px)} }
  .set .n{font-size:22px;font-weight:700}
  .set .m{color:var(--muted);font-size:14px}

  .rounds{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px;margin-top:6px}
  .round{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px 10px;cursor:pointer;font:inherit;color:inherit;text-align:center;
  }
  @media (hover:hover){ .round:hover{border-color:var(--accent)} }
  .round.done{border-color:var(--ok);color:var(--ok)}
  .round b{display:block;font-size:17px}
  .round span{font-size:13px;color:var(--muted)}

  .bar{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .step{
    font-size:14px;color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:5px 12px;background:var(--card);
  }
  .step.on{border-color:var(--accent);color:var(--accent);font-weight:600}
  .prog{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:22px}
  .prog i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}

  .ko{font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1.3}
  .uz{font-size:22px;color:var(--ink);margin-top:10px}
  .big-uz{font-size:32px;font-weight:600;line-height:1.4}

  .opts{display:grid;gap:12px;margin-top:20px}
  .opt{
    background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:16px 18px;text-align:left;font:inherit;color:inherit;cursor:pointer;
  }
  @media (hover:hover){ .opt:hover{border-color:var(--accent)} }
  .opt.ok{border-color:var(--ok);color:var(--ok);font-weight:600}
  .opt.no{border-color:var(--no);color:var(--no)}
  .opt:disabled{cursor:default}

  input[type=text]{
    width:100%;font:inherit;font-size:28px;padding:14px 16px;margin-top:20px;
    border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--ink);
  }
  input:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  input.ok{border-color:var(--ok)}
  input.no{border-color:var(--no)}

  .btn{
    background:var(--accent);color:#fff;border:0;border-radius:11px;
    padding:14px 24px;font:inherit;font-weight:600;cursor:pointer;margin-top:18px;
  }
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  .fb{margin-top:16px;font-size:17px}
  .fb.ok{color:var(--ok)}
  .fb.no{color:var(--no)}
  .fb b{font-weight:700}

  .list{margin-top:8px}
  .list div{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--line)}
  .list div:last-child{border-bottom:0}
  .list .k{font-weight:600}
  .list .v{color:var(--muted);text-align:right}

  .score{font-size:40px;font-weight:700}
  footer{color:var(--muted);font-size:14px;text-align:center;margin-top:26px}
  @media (max-width:520px){ .ko{font-size:34px} .big-uz{font-size:26px} h1{font-size:24px} }
</style>
</head>

<script>
const app = document.getElementById('app');
const state = { set:null, round:null, phase:0, i:0, correct:0, wrong:[], done:{}, miss:{}, stats:{} };
SETS.forEach(s=>{ state.stats[s.id] = s.words.map(()=>null); });

function chunk(arr,n){
  const r=[];for(let i=0;i<arr.length;i+=n)r.push(arr.slice(i,i+n));
  if(r.length>1 && r[r.length-1].length<=3){ const t=r.pop(); r[r.length-1]=r[r.length-1].concat(t); }
  return r;
}
function offset(set,round){ let o=0; const rs=rounds(set); for(let i=0;i<round;i++)o+=rs[i].length; return o; }
function setStat(s){ const a=state.stats[s.id]; return {ok:a.filter(x=>x===true).length, no:a.filter(x=>x===false).length, done:a.filter(x=>x!==null).length, all:a.length}; }
function totalStat(){ let ok=0,no=0,all=0; SETS.forEach(s=>{const t=setStat(s);ok+=t.ok;no+=t.no;all+=t.all;}); return {ok,no,all}; }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function key(){return state.set.id+'-'+state.round;}
function rounds(set){return chunk(set.words,10);}
function norm(s){return s.replace(/\s+/g,'').trim();}
function accepted(ko){
  const v = [ko, ko.replace(/\([^)]*\)/g,''), ko.replace(/[()]/g,'')];
  return [...new Set(v.map(norm).filter(Boolean))];
}

/* ---------- 1. Bo'lim tanlash ---------- */
function screenSets(){
  const t = totalStat();
  app.innerHTML = `
    <div class="card">
      <h2>Bo'limni tanlang</h2>
      <p class="hint">Har bo'lim — bitta TOPIK varianti so'zlari.</p>
      <div class="sets" style="margin-top:16px">
        ${SETS.map((s,i)=>{const st=setStat(s);return `
          <button class="set" data-i="${i}">
            <div class="n">${s.title}</div>
            <div class="m">${s.words.length} ta so'z · ${rounds(s).length} raund</div>
            <div class="m" style="color:${st.done?'var(--ink)':'var(--muted)'}">${st.done? st.ok+'/'+st.all+" to'g'ri · "+st.no+' xato' : 'boshlanmagan'}</div>
          </button>`}).join('')}
      </div>
    </div>
    <div class="card">
      <h2>Umumiy statistika</h2>
      <div class="score">${t.ok} / ${t.all}</div>
      <p class="hint">${t.no} ta xato · ${t.all - t.ok - t.no} ta so'z hali ishlanmagan</p>
      <button class="btn ghost" id="reset">Statistikani tozalash</button>
    </div>`;
  document.getElementById('reset').onclick=()=>{SETS.forEach(s=>{state.stats[s.id]=s.words.map(()=>null)});state.done={};screenSets();};
  app.querySelectorAll('.set').forEach(b=>b.onclick=()=>{state.set=SETS[+b.dataset.i];screenRounds();});
}

/* ---------- 2. Raund tanlash ---------- */
function screenRounds(){
  const rs = rounds(state.set);
  app.innerHTML = `
    <div class="card">
      <h2>${state.set.title} — raundlar</h2>
      <p class="hint">Raundni tanlang. Tartib bilan boring. Hozircha: ${setStat(state.set).ok}/${setStat(state.set).all} to'g'ri · ${setStat(state.set).no} xato</p>
      <div class="rounds">
        ${rs.map((r,i)=>`
          <button class="round ${state.done[state.set.id+'-'+i]?'done':''}" data-i="${i}">
            <b>${i+1}-raund</b><span>${r.length} ta so'z</span>
          </button>`).join('')}
      </div>
      <button class="btn ghost" id="back">Bo'limlarga qaytish</button>
    </div>`;
  app.querySelectorAll('.round').forEach(b=>b.onclick=()=>startRound(+b.dataset.i));
  document.getElementById('back').onclick=screenSets;
}

function startRound(r){
  state.round=r; state.phase=1; state.i=0; state.correct=0; state.wrong=[]; state.miss={};
  phase1();
}
function mark(idx, ok){ if(!ok) state.miss[idx]=true; }
function words(){return rounds(state.set)[state.round];}

function bar(phase, pct){
  const names=["Tanishtiruv","Variant tanlash","Yozish"];
  return `
  <div class="bar">
    <div class="step" style="border-color:var(--line);color:var(--muted)">${state.set.title} · ${state.round+1}-raund</div>
    ${names.map((n,i)=>`<div class="step ${i+1===phase?'on':''}">${i+1}. ${n}</div>`).join('')}
  </div>
  <div class="prog"><i style="width:${pct}%"></i></div>`;
}

/* ---------- Bosqich 1: tanishtiruv ---------- */
function phase1(){
  const w = words()[state.i];
  app.innerHTML = `
    ${bar(1, (state.i)/words().length*100)}
    <div class="card" style="text-align:center;padding:44px 26px">
      <div class="hint">${state.i+1} / ${words().length}</div>
      <div class="ko" style="margin-top:14px">${w[0]}</div>
      <div class="uz">${w[1]}</div>
    </div>
    <div class="row">
      <button class="btn" id="next">${state.i+1===words().length?'Mashqni boshlash':'Keyingi so\'z'}</button>
      <button class="btn ghost" id="prev" ${state.i===0?'disabled':''}>Orqaga</button>
      <button class="btn ghost" id="exit">Raundlar</button>
    </div>`;
  document.getElementById('next').onclick=()=>{
    if(state.i+1===words().length){state.phase=2;state.i=0;state.correct=0;state.wrong=[];phase2();}
    else {state.i++;phase1();}
  };
  document.getElementById('prev').onclick=()=>{if(state.i>0){state.i--;phase1();}};
  document.getElementById('exit').onclick=screenRounds;
}

/* ---------- Bosqich 2: variant tanlash ---------- */
function makeOptions(w){
  const seen = new Set([w[1]]);
  const pick = [];
  const take = list => { for(const x of shuffle(list)){ if(pick.length>=3) return; if(!seen.has(x[1])){ seen.add(x[1]); pick.push(x[1]); } } };
  take(words());              // avval shu raund so'zlari
  take(state.set.words);      // yetmasa — bo'limning qolgan so'zlari
  return shuffle(pick.concat([w[1]]));
}
function phase2(){
  const list = words();
  const w = list[state.i];
  const opts = makeOptions(w);
  app.innerHTML = `
    ${bar(2, state.i/list.length*100)}
    <div class="card">
      <div class="hint">${state.i+1} / ${list.length} · to'g'ri: ${state.correct}</div>
      <div class="ko" style="margin-top:10px">${w[0]}</div>
      <p class="hint" style="margin-top:8px">Ma'nosini tanlang.</p>
      <div class="opts">
        ${opts.map((o,i)=>`<button class="opt" data-o="${i}">${o}</button>`).join('')}
      </div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="btn ghost" id="exit">Raundlar</button>`;
  document.getElementById('exit').onclick=screenRounds;
  const btns=[...app.querySelectorAll('.opt')];
  btns.forEach((b,i)=>b.onclick=()=>{
    btns.forEach(x=>x.disabled=true);
    const chosen=opts[i], ok = chosen===w[1];
    b.classList.add(ok?'ok':'no');
    if(!ok){btns[opts.indexOf(w[1])].classList.add('ok');state.wrong.push(w);}
    else state.correct++;
    mark(state.i, ok);
    document.getElementById('fb').className='fb '+(ok?'ok':'no');
    document.getElementById('fb').innerHTML = ok?"To'g'ri.":`Noto'g'ri. <b>${w[0]}</b> — ${w[1]}`;
    setTimeout(()=>{
      if(state.i+1===list.length){state.phase=3;state.i=0;state.correct=0;state.wrong=[];phase3();}
      else{state.i++;phase2();}
    }, ok?650:1500);
  });
}

/* ---------- Bosqich 3: koreyschasini yozish ---------- */
function phase3(){
  const list = words();
  const w = list[state.i];
  app.innerHTML = `
    ${bar(3, state.i/list.length*100)}
    <div class="card">
      <div class="hint">${state.i+1} / ${list.length} · to'g'ri: ${state.correct}</div>
      <div class="big-uz" style="margin-top:10px">${w[1]}</div>
      <p class="hint" style="margin-top:8px">Koreyschasini yozing.${/[()]/.test(w[0])?" Qavsli qism ixtiyoriy — ikkala variant ham to'g'ri.":""}</p>
      <input type="text" id="in" name="k${Math.random().toString(36).slice(2)}" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" data-form-type="other" data-lpignore="true" placeholder="한국어">
      <div class="row">
        <button class="btn" id="check">Tekshirish</button>
        <button class="btn ghost" id="show">Javobni ko'rsatish</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="btn ghost" id="exit">Raundlar</button>`;
  document.getElementById('exit').onclick=screenRounds;
  const inp=document.getElementById('in'); inp.focus();
  const fb=document.getElementById('fb');
  let answered=false;

  function done(ok){
    answered=true; inp.disabled=true;
    inp.classList.add(ok?'ok':'no');
    fb.className='fb '+(ok?'ok':'no');
    fb.innerHTML = ok?"To'g'ri.":`To'g'ri javob: <b>${w[0]}</b>`;
    if(ok) state.correct++; else state.wrong.push(w);
    mark(state.i, ok);
    setTimeout(()=>{
      if(state.i+1===list.length){
        state.done[key()]=true;
        const o=offset(state.set,state.round);
        list.forEach((_,j)=>{ state.stats[state.set.id][o+j] = !state.miss[j]; });
        finish();
      }
      else{state.i++;phase3();}
    }, ok?650:1800);
  }
  document.getElementById('check').onclick=()=>{
    if(answered) return;
    if(!inp.value.trim()){inp.focus();return;}
    done(accepted(w[0]).includes(norm(inp.value)));
  };
  document.getElementById('show').onclick=()=>{if(!answered) done(false);};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('check').click();});
}

function setDoneCard(){
  const st=setStat(state.set);
  if(st.done<st.all) return '';
  const t=totalStat();
  return `
    <div class="card">
      <h2>${state.set.title} tugadi</h2>
      <div class="score">${st.ok} / ${st.all}</div>
      <p class="hint">${st.no} ta xato</p>
      <h2 style="margin-top:22px">Umumiy statistika</h2>
      <div class="score">${t.ok} / ${t.all}</div>
      <p class="hint">${t.no} ta xato · ${t.all-t.ok-t.no} ta so'z hali ishlanmagan</p>
      <button class="btn" id="tosets">Bo'limlarga qaytish</button>
    </div>`;
}

/* ---------- Yakun ---------- */
function finish(){
  const list=words();
  const pct=Math.round(state.correct/list.length*100);
  const rs=rounds(state.set);
  const hasNext=state.round+1<rs.length;
  app.innerHTML=`
    <div class="card">
      <h2>${state.round+1}-raund tugadi</h2>
      <div class="score">${state.correct} / ${list.length}</div>
      <p class="hint">Yozish bosqichi natijasi — ${pct}%</p>
      ${state.wrong.length?`
        <h2 style="margin-top:24px">Takrorlash kerak</h2>
        <div class="list">
          ${state.wrong.map(w=>`<div><span class="k">${w[0]}</span><span class="v">${w[1]}</span></div>`).join('')}
        </div>`:`<p class="hint" style="margin-top:14px">Hamma so'z to'g'ri. Keyingi raundga o'ting.</p>`}
      <div class="row">
        <button class="btn" id="again">Raundni qayta yechish</button>
        ${hasNext?`<button class="btn" id="next">${state.round+2}-raund</button>`:''}
        <button class="btn ghost" id="exit">Raundlar</button>
      </div>
    </div>
    ${setDoneCard()}`;
  document.getElementById('again').onclick=()=>startRound(state.round);
  const n=document.getElementById('next'); if(n) n.onclick=()=>startRound(state.round+1);
  const ts=document.getElementById('tosets'); if(ts) ts.onclick=screenSets;
  document.getElementById('exit').onclick=screenRounds;
}

screenSets();
</script>
</body>

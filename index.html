<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GETTOPIK online — 43~44-savollar so'zlari</title>
<style>
  :root{
    --bg:#EEF1F6; --card:#FFFFFF; --ink:#0E1320; --muted:#5B6478;
    --line:#D8DEE9; --accent:#067DF4; --ok:#127A4B; --no:#E91F3D; --red:#E91F3D;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    font-size:17px; line-height:1.7; display:flex; justify-content:center;
    padding:24px 16px 56px;
  }
  .wrap{width:100%;max-width:720px}
  header{margin-bottom:18px}
  .top{display:flex;align-items:center;gap:14px}
  .logo{background:#fff;border:1px solid var(--line);border-radius:12px;padding:7px 9px;line-height:0;flex:none}
  .logo img{height:42px;width:auto;display:block}
  .brand{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600}
  h1 .accent{color:var(--red)}
  h1{font-size:30px;line-height:1.25;margin-top:6px;letter-spacing:-.02em}
  .lead{color:var(--muted);margin-top:8px}
  .who{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;font-size:15px;color:var(--muted)}
  .who b{color:var(--ink)}
  .link{background:none;border:0;color:var(--accent);font:inherit;font-size:15px;cursor:pointer;padding:0;text-decoration:underline}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;margin-bottom:16px}
  h2{font-size:20px;margin-bottom:14px;letter-spacing:-.01em}
  .hint{color:var(--muted);font-size:15px}

  .sets{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  .set{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;text-align:left;font:inherit;color:inherit;transition:border-color .15s,transform .15s}
  @media (hover:hover){ .set:hover{border-color:var(--accent);transform:translateY(-2px)} }
  .set .n{font-size:22px;font-weight:700}
  .set .m{color:var(--muted);font-size:14px}

  .rounds{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px;margin-top:6px}
  .round{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 10px;cursor:pointer;font:inherit;color:inherit;text-align:center}
  @media (hover:hover){ .round:hover{border-color:var(--accent)} }
  .round.done{border-color:var(--ok);color:var(--ok)}
  .round b{display:block;font-size:17px}
  .round span{font-size:13px;color:var(--muted)}

  .bar{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .step{font-size:14px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 12px;background:var(--card)}
  .step.on{border-color:var(--accent);color:var(--accent);font-weight:600}
  .prog{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:22px}
  .prog i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}

  .ko{font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1.3}
  .uz{font-size:22px;margin-top:10px}
  .big-uz{font-size:32px;font-weight:600;line-height:1.4}

  .opts{display:grid;gap:12px;margin-top:20px}
  .opt{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px 18px;text-align:left;font:inherit;color:inherit;cursor:pointer}
  @media (hover:hover){ .opt:hover{border-color:var(--accent)} }
  .opt.ok{border-color:var(--ok);color:var(--ok);font-weight:600}
  .opt.no{border-color:var(--no);color:var(--no)}
  .opt:disabled{cursor:default}

  input[type=text]{width:100%;font:inherit;font-size:28px;padding:14px 16px;margin-top:16px;border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--ink)}
  input.name{font-size:20px}
  input:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  input.ok{border-color:var(--ok)} input.no{border-color:var(--no)}

  .btn{background:var(--accent);color:#fff;border:0;border-radius:11px;padding:14px 24px;font:inherit;font-weight:600;cursor:pointer;margin-top:16px}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn:disabled{opacity:.45;cursor:default}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  .fb{margin-top:16px;font-size:17px}
  .fb.ok{color:var(--ok)} .fb.no{color:var(--no)}

  .list{margin-top:8px}
  .list div{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--line)}
  .list div:last-child{border-bottom:0}
  .list .k{font-weight:600}
  .list .v{color:var(--muted);text-align:right}

  .rank{width:100%;border-collapse:collapse;margin-top:6px}
  .rank td,.rank th{padding:10px 6px;border-bottom:1px solid var(--line);text-align:left;font-size:16px}
  .rank th{font-size:14px;color:var(--muted);font-weight:600}
  .rank td.num{text-align:right;white-space:nowrap}
  .rank tr.me td{font-weight:700;color:var(--accent)}

  .score{font-size:40px;font-weight:700}
  .warn{background:#FFF6E5;border:1px solid #F0D9A8;color:#6B4E00;border-radius:11px;padding:12px 14px;font-size:14px;margin-bottom:16px}
  footer{color:var(--muted);font-size:14px;text-align:center;margin-top:26px}
  @media (max-width:520px){ .ko{font-size:34px} .big-uz{font-size:26px} h1{font-size:24px} }
</style>
</head>

</script>
<script>
/* ============ bo'limlar (43~44 va 46~47) ============ */
// SECTIONS data2.js dan keladi. Har set'ga secId qo'shamiz, global SETS = hamma set.
SECTIONS.forEach(sec=>sec.sets.forEach(s=>{ s.secId=sec.id; s.uid=sec.id+'-'+s.id; }));
const ALLSETS = SECTIONS.flatMap(s=>s.sets);
let SEC = SECTIONS[0].id;                 // joriy bo'lim
function curSets(){ return SECTIONS.find(x=>x.id===SEC).sets; }
function secLabel(id){ return SECTIONS.find(x=>x.id===id).label; }
function secWordCount(id){ return SECTIONS.find(x=>x.id===id).sets.reduce((a,b)=>a+b.words.length,0); }

/* ============ server (umumiy reyting) ============ */
const API='https://gogeup-soz-reyting.online-koreys-tili.workers.dev';
const GAME='topik-soz-v4';   // so'zlar almashgani uchun reyting noldan
let TOPS={}, TOPERR={};   // reyting kesh: game nomi -> rows / xato

async function pushScore(){
  const games=[GAME, ...SECTIONS.map(sec=>GAME+'-'+sec.id)];
  for(const g of games){
    const secId = g===GAME ? undefined : g.slice(GAME.length+1);
    const s=userScore(DB.current, secId);
    try{
      await fetch(API+'/score',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({game:g,name:DB.current,ok:s.ok,done:s.done})});
    }catch(e){ /* internet yo'q — natija telefonda saqlanib turaveradi */ }
  }
}
async function fetchTop(game){
  try{
    const r=await fetch(API+'/top?game='+game);
    const d=await r.json(); TOPS[game]=d.rows||[]; TOPERR[game]=false;
  }catch(e){ TOPS[game]=null; TOPERR[game]=true; }
}

/* ============ saqlash ============ */
const KEY='gettopik_soz_v4';   // v2 — so'zlar almashgani uchun eski natijalar tozalanadi
let DB={users:{},current:null};
let SAVE_OK=true;

function load(){
  try{ const r=localStorage.getItem(KEY); if(r) DB=JSON.parse(r); }
  catch(e){ SAVE_OK=false; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(DB)); }
  catch(e){ SAVE_OK=false; }
}
function blankUser(){
  const st={}; ALLSETS.forEach(s=>st[s.uid]={});
  return {stats:st, done:{}, last:null};
}
function U(){
  if(!DB.current) return null;
  let u=DB.users[DB.current];
  if(!u){ u=DB.users[DB.current]=blankUser(); }
  ALLSETS.forEach(s=>{
    let a=u.stats[s.uid];
    if(!a){ u.stats[s.uid]={}; return; }
    if(Array.isArray(a)){                      // eski format (indeks bo'yicha) -> so'z bo'yicha
      const o={}; a.forEach((v,i)=>{ if(v!==null && s.words[i]) o[s.words[i][0]]=v; });
      u.stats[s.uid]=o;
    }
  });
  if(!u.done) u.done={};
  return u;
}

/* ============ yordamchi ============ */
const app=document.getElementById('app');
const whoEl=document.getElementById('who');
const state={set:null, round:null, mode:'round', list:[], i:0, correct:0, wrong:[], miss:{}};

function chunk(arr,n){
  const r=[]; for(let i=0;i<arr.length;i+=n) r.push(arr.slice(i,i+n));
  if(r.length>1 && r[r.length-1].length<=4){ const t=r.pop(); r[r.length-1]=r[r.length-1].concat(t); }
  return r;
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function rounds(set){ return chunk(set.words.map(w=>({ko:w[0],uz:w[1],uid:set.uid})),10); }
function norm(s){return s.replace(/\s+/g,'').trim();}
function accepted(ko){ const v=[ko, ko.replace(/\([^)]*\)/g,''), ko.replace(/[()]/g,'')]; return [...new Set(v.map(norm).filter(Boolean))]; }
function setByUid(uid){ return ALLSETS.find(s=>s.uid===uid); }
function setById(id){ return curSets().find(s=>s.id===id); }   // joriy bo'lim ichida
// stat: har so'z koreyscha kaliti bo'yicha saqlanadi -> yangi so'z qo'shilsa eski natija saqlanadi
function setStat(s){
  const a=U().stats[s.uid]; let ok=0,no=0,done=0;
  s.words.forEach(w=>{ const v=a[w[0]]; if(v===true){ok++;done++;} else if(v===false){no++;done++;} });
  return {ok,no,done,all:s.words.length};
}
function secStat(){ let ok=0,no=0,done=0,all=0; curSets().forEach(s=>{const t=setStat(s);ok+=t.ok;no+=t.no;done+=t.done;all+=t.all;}); return {ok,no,done,all}; }
function totalStat(){ let ok=0,no=0,done=0,all=0; ALLSETS.forEach(s=>{const t=setStat(s);ok+=t.ok;no+=t.no;done+=t.done;all+=t.all;}); return {ok,no,done,all}; }
function wrongOf(s){
  const a=U().stats[s.uid], out=[];
  s.words.forEach(w=>{ if(a[w[0]]===false) out.push({ko:w[0],uz:w[1],uid:s.uid}); });
  return out;
}
function secWrong(){ return curSets().flatMap(s=>wrongOf(s)); }
function userScore(name, secId){
  const u=DB.users[name]; if(!u) return {ok:0,done:0};
  let ok=0,done=0;
  const sets = secId ? SECTIONS.find(x=>x.id===secId).sets : ALLSETS;
  sets.forEach(s=>{ const a=u.stats[s.uid]; if(!a||Array.isArray(a)) return;
    s.words.forEach(w=>{ const v=a[w[0]]; if(v!==undefined&&v!==null){done++; if(v===true) ok++;} }); });
  return {ok,done};
}

/* ============ ism ============ */
function screenName(){
  whoEl.innerHTML='';
  app.innerHTML=`
    ${SAVE_OK?'':'<div class="warn">Bu brauzerda natija saqlanmaydi. Saytni oddiy oynada oching (yashirin rejim emas).</div>'}
    <div class="card">
      <h2>Ismingizni yozing</h2>
      <p class="hint">Natijangiz shu ism ostida saqlanadi. Keyingi safar shu ismni tanlab davom etasiz.</p>
      <input type="text" class="name" id="nm" maxlength="24" placeholder="Ism Familiya" autocomplete="off">
      <div class="row"><button class="btn" id="go">Boshlash</button></div>
    </div>
    ${Object.keys(DB.users).length?`
    <div class="card">
      <h2>Avvalgi ismlar</h2>
      <div class="row">
        ${Object.keys(DB.users).map(n=>`<button class="btn ghost" data-n="${n}">${n}</button>`).join('')}
      </div>
    </div>`:''}`;
  const nm=document.getElementById('nm'); nm.focus();
  const go=()=>{
    const v=nm.value.trim(); if(!v) {nm.focus(); return;}
    DB.current=v; if(!DB.users[v]) DB.users[v]=blankUser(); save(); screenSections();
  };
  document.getElementById('go').onclick=go;
  nm.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  app.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{DB.current=b.dataset.n;save();screenSections();});
}
function whoBar(showSecLink){
  whoEl.innerHTML=`<span>O'quvchi: <b>${DB.current}</b></span>
    ${showSecLink?`<button class="link" id="tosec">bo'limlar</button>`:''}
    <button class="link" id="chg">ismni almashtirish</button>`;
  document.getElementById('chg').onclick=()=>{DB.current=null;save();screenName();};
  const ts=document.getElementById('tosec'); if(ts) ts.onclick=screenSections;
}

/* ============ bo'lim tanlash (43~44 / 46~47) ============ */
function screenSections(){
  whoBar(false);
  if(TOPS[GAME]===undefined && !TOPERR[GAME]) fetchTop(GAME).then(()=>{ if(document.getElementById('reload')) screenSections(); });
  const t=totalStat();
  app.innerHTML=`
    ${SAVE_OK?'':'<div class="warn">Diqqat: bu brauzerda natija saqlanmayapti.</div>'}
    <div class="card">
      <h2>Qaysi qismni mashq qilamiz?</h2>
      <div class="sets" style="margin-top:12px">
        ${SECTIONS.map(sec=>{
          const prevSec=SEC; SEC=sec.id; const st=secStat(); SEC=prevSec;
          return `<button class="set" data-s="${sec.id}">
            <div class="n">${sec.label}</div>
            <div class="m">${sec.sets.reduce((a,b)=>a+b.words.length,0)} ta so'z · ${sec.sets.length} ta variant</div>
            <div class="m" style="color:${st.done?'var(--ink)':'var(--muted)'}">${st.done? st.ok+'/'+st.all+" to'g'ri":'boshlanmagan'}</div>
          </button>`;}).join('')}
      </div>
    </div>
    <div class="card">
      <h2>Umumiy statistika</h2>
      <div class="score">${t.ok} / ${t.all}</div>
      <p class="hint">${t.no} ta xato · ${t.all-t.ok-t.no} ta so'z hali ishlanmagan</p>
    </div>
    ${rankCard(GAME, 'Umumiy reyting')}`;
  app.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{ SEC=b.dataset.s; screenSets(); });
  const rl=document.getElementById('reload'); if(rl) rl.onclick=async()=>{ delete TOPS[GAME]; delete TOPERR[GAME]; screenSections(); await fetchTop(GAME); screenSections(); };
}

/* ============ variantlar (joriy bo'lim ichida) ============ */
function screenSets(){
  whoBar(true);
  const secGame=GAME+'-'+SEC;
  if(TOPS[secGame]===undefined && !TOPERR[secGame]) fetchTop(secGame).then(()=>{ if(document.getElementById('reload')) screenSets(); });
  const t=secStat(), u=U(), aw=secWrong();
  const sets=curSets();
  const last=u.last && u.last.sec===SEC ? u.last : null;
  const resume=last?`<button class="btn" id="res">Davom etish — ${setByUid(last.uid).title} · ${last.round+1}-raund</button>`:'';
  app.innerHTML=`
    ${SAVE_OK?'':'<div class="warn">Diqqat: bu brauzerda natija saqlanmayapti.</div>'}
    <div class="card" style="padding:16px 20px"><b>${secLabel(SEC)}</b></div>
    ${resume?`<div class="card"><h2>Qoldirgan joyingiz</h2>${resume}</div>`:''}
    <div class="card">
      <h2>Variantni tanlang</h2>
      <div class="sets" style="margin-top:12px">
        ${sets.map((s,i)=>{const st=setStat(s);return `
          <button class="set" data-i="${i}">
            <div class="n">${s.title}</div>
            <div class="m">${s.sub.replace(/^\d+~\d+[^·]*·?\s*/, '')||s.words.length+' ta'}</div>
            <div class="m">${s.words.length} ta so'z · ${rounds(s).length} raund</div>
            <div class="m" style="color:${st.done?'var(--ink)':'var(--muted)'}">${st.done? st.ok+'/'+st.all+" to'g'ri · "+st.no+' xato':'boshlanmagan'}</div>
          </button>`}).join('')}
      </div>
    </div>
    <div class="card">
      <h2>${secLabel(SEC)} — statistika</h2>
      <div class="score">${t.ok} / ${t.all}</div>
      <p class="hint">${t.no} ta xato · ${t.all-t.ok-t.no} ta so'z hali ishlanmagan</p>
      ${aw.length?`<button class="btn" id="rev">Xato so'zlarni takrorlash (${aw.length} ta)</button>`:''}
    </div>
    ${rankCard(secGame, secLabel(SEC)+" — reyting")}
    <div class="card">
      <div class="row">
        <button class="btn ghost" id="tosec2">Boshqa qismga o'tish</button>
        <button class="btn ghost" id="reset">Hamma natijamni tozalash</button>
      </div>
    </div>`;
  app.querySelectorAll('.set').forEach(b=>b.onclick=()=>{state.set=sets[+b.dataset.i];screenRounds();});
  const r=document.getElementById('res'); if(r) r.onclick=()=>{state.set=setByUid(last.uid);startRound(last.round);};
  const rv=document.getElementById('rev'); if(rv) rv.onclick=()=>startReview(secWrong(),null);
  const rl=document.getElementById('reload'); if(rl) rl.onclick=async()=>{ delete TOPS[secGame]; delete TOPERR[secGame]; screenSets(); await fetchTop(secGame); screenSets(); };
  document.getElementById('tosec2').onclick=screenSections;
  document.getElementById('reset').onclick=()=>{
    if(confirm('Barcha natijangiz (ikkala qism) o\'chiriladi. Davom etamizmi?')){ DB.users[DB.current]=blankUser(); save(); screenSets(); }
  };
}

function rankCard(game, title){
  const top=TOPS[game], err=TOPERR[game];
  const max = game===GAME ? 538 : secWordCount(game.slice(GAME.length+1));
  let body;
  if(top===undefined && !err) body='<p class="hint">Yuklanmoqda...</p>';
  else if(err) body='<p class="hint">Reytingni yuklab bo\'lmadi. Internetni tekshiring.</p>';
  else if(!top.length) body='<p class="hint">Hali hech kim natija yubormagan. Birinchi bo\'ling.</p>';
  else body=`<table class="rank">
        <tr><th>#</th><th>Ism</th><th class="num">To'g'ri</th><th class="num">Ishlangan</th></tr>
        ${top.map((r,i)=>`<tr class="${r.name===DB.current?'me':''}">
          <td>${i+1}</td><td>${r.name}</td><td class="num">${r.ok}</td><td class="num">${r.done} / ${max}</td></tr>`).join('')}
      </table>`;
  return `
    <div class="card">
      <h2>${title}</h2>
      <p class="hint">Barcha o'quvchilar. Raund tugagach natijangiz avtomatik yuboriladi.</p>
      ${body}
      <button class="btn ghost" id="reload">Yangilash</button>
    </div>`;
}

/* ============ raundlar ============ */
function screenRounds(){
  whoBar(true);
  const rs=rounds(state.set), st=setStat(state.set), w=wrongOf(state.set), u=U();
  app.innerHTML=`
    <div class="card">
      <h2>${state.set.title} — raundlar</h2>
      <p class="hint">${state.set.sub} · ${st.ok}/${st.all} to'g'ri · ${st.no} xato</p>
      <div class="rounds">
        ${rs.map((r,i)=>{const rdone=r.every(w=>U().stats[state.set.uid][w.ko]!==undefined);return `<button class="round ${rdone?'done':''}" data-i="${i}">
          <b>${i+1}-raund</b><span>${r.length} ta so'z</span></button>`}).join('')}
      </div>
      <div class="row">
        ${w.length?`<button class="btn" id="rev">Xato so'zlarni takrorlash (${w.length} ta)</button>`:''}
        <button class="btn ghost" id="back">Variantlar</button>
      </div>
    </div>`;
  app.querySelectorAll('.round').forEach(b=>b.onclick=()=>startRound(+b.dataset.i));
  const rv=document.getElementById('rev'); if(rv) rv.onclick=()=>startReview(w, state.set);
  document.getElementById('back').onclick=screenSets;
}

function startRound(r){
  state.mode='round'; state.round=r; state.list=rounds(state.set)[r];
  state.i=0; state.correct=0; state.wrong=[]; state.miss={};
  const u=U(); u.last={sec:SEC, uid:state.set.uid, round:r}; save();
  phase1();
}
function startReview(list, set){
  state.mode='review'; state.set=set; state.round=null; state.list=shuffle(list);
  state.i=0; state.correct=0; state.wrong=[]; state.miss={};
  phase1();
}
function title(){ return state.mode==='review' ? 'Xatolarni takrorlash' : state.set.title+' · '+(state.round+1)+'-raund'; }
function backScreen(){ return state.mode==='review' && !state.set ? screenSets : screenRounds; }

function bar(phase, pct){
  const names=["Tanishtiruv","Variant tanlash","Yozish"];
  return `<div class="bar">
      <div class="step">${title()}</div>
      ${names.map((n,i)=>`<div class="step ${i+1===phase?'on':''}">${i+1}. ${n}</div>`).join('')}
    </div>
    <div class="prog"><i style="width:${pct}%"></i></div>`;
}
function markMiss(i, ok){ if(!ok) state.miss[i]=true; }
function commit(){
  const u=U();
  state.list.forEach((w,j)=>{ u.stats[w.uid][w.ko] = !state.miss[j]; });
  save();
  pushScore().then(()=>{ TOPS={}; TOPERR={}; });
}

/* ---- 1: tanishtiruv ---- */
function phase1(){
  const w=state.list[state.i];
  app.innerHTML=`
    ${bar(1, state.i/state.list.length*100)}
    <div class="card" style="text-align:center;padding:44px 26px">
      <div class="hint">${state.i+1} / ${state.list.length}</div>
      <div class="ko" style="margin-top:14px">${w.ko}</div>
      <div class="uz">${w.uz}</div>
    </div>
    <div class="row">
      <button class="btn" id="next">${state.i+1===state.list.length?'Mashqni boshlash':"Keyingi so'z"}</button>
      <button class="btn ghost" id="prev" ${state.i===0?'disabled':''}>Orqaga</button>
      <button class="btn ghost" id="exit">Chiqish</button>
    </div>`;
  document.getElementById('next').onclick=()=>{
    if(state.i+1===state.list.length){ state.i=0;state.correct=0;state.wrong=[];phase2(); }
    else { state.i++; phase1(); }
  };
  document.getElementById('prev').onclick=()=>{ if(state.i>0){state.i--;phase1();} };
  document.getElementById('exit').onclick=backScreen();
}

/* ---- 2: variant tanlash ---- */
function makeOptions(w){
  const seen=new Set([w.uz]); const pick=[];
  const take=list=>{ for(const x of shuffle(list)){ if(pick.length>=3) return; const m=x.uz||x[1]; if(!seen.has(m)){ seen.add(m); pick.push(m); } } };
  take(state.list);
  take(setByUid(w.uid).words.map(x=>({uz:x[1]})));
  return shuffle(pick.concat([w.uz]));
}
function phase2(){
  const w=state.list[state.i], opts=makeOptions(w);
  app.innerHTML=`
    ${bar(2, state.i/state.list.length*100)}
    <div class="card">
      <div class="hint">${state.i+1} / ${state.list.length} · to'g'ri: ${state.correct}</div>
      <div class="ko" style="margin-top:10px">${w.ko}</div>
      <p class="hint" style="margin-top:8px">Ma'nosini tanlang.</p>
      <div class="opts">${opts.map((o,i)=>`<button class="opt" data-o="${i}">${o}</button>`).join('')}</div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="btn ghost" id="exit">Chiqish</button>`;
  document.getElementById('exit').onclick=backScreen();
  const btns=[...app.querySelectorAll('.opt')];
  btns.forEach((b,i)=>b.onclick=()=>{
    btns.forEach(x=>x.disabled=true);
    const ok=opts[i]===w.uz;
    b.classList.add(ok?'ok':'no');
    if(!ok){ btns[opts.indexOf(w.uz)].classList.add('ok'); state.wrong.push(w); } else state.correct++;
    markMiss(state.i, ok);
    const fb=document.getElementById('fb');
    fb.className='fb '+(ok?'ok':'no');
    fb.innerHTML=ok?"To'g'ri.":`Noto'g'ri. <b>${w.ko}</b> — ${w.uz}`;
    setTimeout(()=>{
      if(state.i+1===state.list.length){ state.i=0;state.correct=0;state.wrong=[];phase3(); }
      else { state.i++; phase2(); }
    }, ok?650:1500);
  });
}

/* ---- 3: yozish ---- */
function phase3(){
  const w=state.list[state.i];
  app.innerHTML=`
    ${bar(3, state.i/state.list.length*100)}
    <div class="card">
      <div class="hint">${state.i+1} / ${state.list.length} · to'g'ri: ${state.correct}</div>
      <div class="big-uz" style="margin-top:10px">${w.uz}</div>
      <p class="hint" style="margin-top:8px">Koreyschasini yozing.${/[()]/.test(w.ko)?" Qavsli qism ixtiyoriy.":""}</p>
      <input type="text" id="in" name="k${Math.random().toString(36).slice(2)}" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" data-form-type="other" data-lpignore="true" placeholder="한국어">
      <div class="row">
        <button class="btn" id="check">Tekshirish</button>
        <button class="btn ghost" id="show">Javobni ko'rsatish</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="btn ghost" id="exit">Chiqish</button>`;
  document.getElementById('exit').onclick=backScreen();
  const inp=document.getElementById('in'); inp.focus();
  const fb=document.getElementById('fb');
  let answered=false;
  function done(ok){
    answered=true; inp.disabled=true; inp.classList.add(ok?'ok':'no');
    fb.className='fb '+(ok?'ok':'no');
    fb.innerHTML=ok?"To'g'ri.":`To'g'ri javob: <b>${w.ko}</b>`;
    if(ok) state.correct++; else state.wrong.push(w);
    markMiss(state.i, ok);
    setTimeout(()=>{
      if(state.i+1===state.list.length){ commit(); finish(); }
      else { state.i++; phase3(); }
    }, ok?650:1800);
  }
  document.getElementById('check').onclick=()=>{
    if(answered) return;
    if(!inp.value.trim()){ inp.focus(); return; }
    done(accepted(w.ko).includes(norm(inp.value)));
  };
  document.getElementById('show').onclick=()=>{ if(!answered) done(false); };
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('check').click(); });
}

/* ---- yakun ---- */
function finish(){
  const n=state.list.length, pct=Math.round(state.correct/n*100);
  const missed=state.list.filter((w,j)=>state.miss[j]);
  const rs=state.set?rounds(state.set):[];
  const hasNext=state.mode==='round' && state.round+1<rs.length;
  app.innerHTML=`
    <div class="card">
      <h2>${state.mode==='review'?'Takrorlash tugadi':state.round+1+'-raund tugadi'}</h2>
      <div class="score">${state.correct} / ${n}</div>
      <p class="hint">Yozish bosqichi — ${pct}%</p>
      ${missed.length?`
        <h2 style="margin-top:24px">Xato qilgan so'zlaringiz</h2>
        <div class="list">${missed.map(w=>`<div><span class="k">${w.ko}</span><span class="v">${w.uz}</span></div>`).join('')}</div>
        <button class="btn" id="onlywrong">Faqat shu so'zlarni takrorlash (${missed.length} ta)</button>
        `:`<p class="hint" style="margin-top:14px">Hamma so'z to'g'ri.</p>`}
      <div class="row">
        <button class="btn ghost" id="again">${state.mode==='review'?'Qaytadan':'Raundni qayta yechish'}</button>
        ${hasNext?`<button class="btn ghost" id="next">${state.round+2}-raund</button>`:''}
        <button class="btn ghost" id="exit">${state.set?'Raundlar':"Variantlar"}</button>
      </div>
    </div>
    ${setDoneCard()}`;
  const ow=document.getElementById('onlywrong'); if(ow) ow.onclick=()=>startReview(missed, state.set);
  const ag=document.getElementById('again');
  ag.onclick=()=> state.mode==='review' ? startReview(state.list, state.set) : startRound(state.round);
  const nx=document.getElementById('next'); if(nx) nx.onclick=()=>startRound(state.round+1);
  document.getElementById('exit').onclick=backScreen();
  const ts=document.getElementById('tosets'); if(ts) ts.onclick=screenSets;
}
function setDoneCard(){
  if(state.mode!=='round') return '';
  const st=setStat(state.set); if(st.done<st.all) return '';
  const t=secStat();
  return `<div class="card">
      <h2>${state.set.title} tugadi</h2>
      <div class="score">${st.ok} / ${st.all}</div>
      <p class="hint">${st.no} ta xato</p>
      <h2 style="margin-top:22px">${secLabel(SEC)} — statistika</h2>
      <div class="score">${t.ok} / ${t.all}</div>
      <p class="hint">${t.no} ta xato · ${t.all-t.ok-t.no} ta so'z hali ishlanmagan</p>
      <button class="btn" id="tosets">Variantlarga qaytish</button>
    </div>`;
}

/* ---- start ---- */
load();
if(DB.current && DB.users[DB.current]) screenSections(); else screenName();
</script>
